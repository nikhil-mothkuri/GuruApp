<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SakshamBharat UI mockups">
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="btnGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F47F2F"/>
      <stop offset="100%" stop-color="#F8C14B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="32" fill="#F4F7FB" />

  <!-- Screen 1 -->
  <g transform="translate(60 60)">
    <rect width="320" height="580" rx="40" fill="url(#screenBg)" filter="url(#softShadow)" />
    <rect x="24" y="28" width="272" height="40" rx="20" fill="#FFFFFF" opacity="0.92" />
    <text x="40" y="56" font-family="Poppins, sans-serif" font-size="20" fill="#111827">Discover skills & products</text>
    <rect x="24" y="88" width="272" height="46" rx="24" fill="#F8FAFC" stroke="#E2E8F0" />
    <text x="40" y="118" font-family="Mukta, sans-serif" font-size="14" fill="#64748B">Search by topic, guru, product...</text>
    <rect x="24" y="150" width="272" height="120" rx="32" fill="#FFFFFF" />
    <text x="40" y="184" font-family="Poppins, sans-serif" font-size="18" font-weight="600" fill="#111827">Top rated gurus</text>
    <rect x="40" y="208" width="240" height="60" rx="20" fill="#EFF6FF" />
    <text x="58" y="246" font-family="Mukta, sans-serif" font-size="13" fill="#1E3A8A">Digital Marketing</text>
    <rect x="24" y="290" width="272" height="120" rx="32" fill="#FFFFFF" />
    <text x="40" y="324" font-family="Poppins, sans-serif" font-size="18" font-weight="600" fill="#111827">Trending products</text>
    <rect x="40" y="348" width="90" height="28" rx="14" fill="#FEF3C7" />
    <text x="50" y="366" font-family="Mukta, sans-serif" font-size="12" fill="#92400E">Artisan crafts</text>
    <rect x="40" y="388" width="90" height="28" rx="14" fill="#DCFCE7" />
    <text x="50" y="406" font-family="Mukta, sans-serif" font-size="12" fill="#166534">Learning kits</text>
    <g transform="translate(24 480)">
      <rect width="272" height="70" rx="28" fill="#FFFFFF" />
      <text x="24" y="38" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#111827">Be a Guru</text>
      <text x="24" y="58" font-family="Mukta, sans-serif" font-size="12" fill="#64748B">Share your skill with millions</text>
    </g>
  </g>

  <!-- Screen 2 -->
  <g transform="translate(440 60)">
    <rect width="320" height="580" rx="40" fill="url(#screenBg)" filter="url(#softShadow)" />
    <circle cx="160" cy="96" r="48" fill="#1E3A8A" opacity="0.12" />
    <circle cx="160" cy="96" r="36" fill="#1E3A8A" />
    <rect x="46" y="170" width="228" height="36" rx="18" fill="#FFFFFF" />
    <text x="60" y="194" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#111827">Riya Sharma</text>
    <text x="60" y="214" font-family="Mukta, sans-serif" font-size="12" fill="#64748B">Creative Skill Coach</text>
    <rect x="24" y="228" width="272" height="220" rx="32" fill="#FFFFFF" />
    <text x="40" y="266" font-family="Poppins, sans-serif" font-size="18" font-weight="700" fill="#111827">Book a session</text>
    <text x="40" y="292" font-family="Mukta, sans-serif" font-size="13" fill="#475569">Learn product design, pricing, and market strategy.</text>
    <rect x="40" y="330" width="240" height="42" rx="22" fill="url(#btnGradient)" />
    <text x="90" y="359" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Book now</text>
    <text x="40" y="398" font-family="Poppins, sans-serif" font-size="14" font-weight="600" fill="#111827">4.9 · 1.2k reviews</text>
    <rect x="40" y="420" width="240" height="40" rx="20" fill="#EFF6FF" />
    <text x="52" y="448" font-family="Mukta, sans-serif" font-size="13" fill="#1E3A8A">Marketing, sales & creative business</text>
  </g>

  <!-- Screen 3 -->
  <g transform="translate(820 60)">
    <rect width="320" height="580" rx="40" fill="url(#screenBg)" filter="url(#softShadow)" />
    <text x="40" y="56" font-family="Poppins, sans-serif" font-size="18" font-weight="700" fill="#111827">Seller dashboard</text>
    <rect x="24" y="88" width="272" height="90" rx="28" fill="#FFFFFF" />
    <text x="40" y="120" font-family="Mukta, sans-serif" font-size="13" fill="#475569">Today</text>
    <text x="40" y="146" font-family="Poppins, sans-serif" font-size="24" font-weight="700" fill="#111827">₹14,800</text>
    <rect x="40" y="210" width="120" height="70" rx="24" fill="#EFF6FF" />
    <text x="52" y="244" font-family="Mukta, sans-serif" font-size="12" fill="#1E3A8A">Orders</text>
    <text x="52" y="268" font-family="Poppins, sans-serif" font-size="18" font-weight="700" fill="#111827">32</text>
    <rect x="180" y="210" width="116" height="70" rx="24" fill="#FFF7ED" />
    <text x="196" y="244" font-family="Mukta, sans-serif" font-size="12" fill="#92400E">Live listings</text>
    <text x="196" y="268" font-family="Poppins, sans-serif" font-size="18" font-weight="700" fill="#111827">8</text>
    <rect x="24" y="300" width="272" height="100" rx="24" fill="#FFFFFF" />
    <text x="40" y="336" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#111827">Active product</text>
    <text x="40" y="358" font-family="Mukta, sans-serif" font-size="13" fill="#64748B">Handcrafted learning kit for digital artisans</text>
    <text x="40" y="386" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">₹799</text>
    <rect x="140" y="380" width="120" height="36" rx="18" fill="#E2E8F0" />
    <text x="164" y="404" font-family="Mukta, sans-serif" font-size="12" fill="#475569">Edit</text>
    <circle cx="280" cy="514" r="30" fill="url(#btnGradient)" />
    <text x="270" y="520" font-family="Poppins, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">+</text>
  </g>
</svg>