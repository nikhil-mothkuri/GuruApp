name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── 1. Type-check all packages ───────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @guruapp/shared build

      - name: Generate Prisma client
        run: pnpm --filter server exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Type-check server
        run: pnpm --filter server exec tsc --noEmit

      - name: Type-check client
        run: pnpm --filter client exec tsc -b --noEmit

  # ── 2. Server integration tests (against Neon Postgres) ─────────────────────
  test:
    runs-on: ubuntu-latest
    needs: type-check
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: test-google-client-id
      UPLOAD_DIR: uploads-test
      MAX_FILE_SIZE_MB: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @guruapp/shared build

      - name: Generate Prisma client
        run: pnpm --filter server exec prisma generate

      - name: Run server tests with coverage
        run: pnpm --filter server exec jest --coverage --forceExit --ci
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: server/coverage/

  # ── 3. Build client ───────────────────────────────────────────────────────────
  build-client:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @guruapp/shared build

      - name: Build Vite app
        run: pnpm --filter client build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

  # ── 4. Build server (TypeScript compile) ─────────────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @guruapp/shared build

      - name: Generate Prisma client
        run: pnpm --filter server exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Compile server
        run: pnpm --filter server build

  # ── 5. Frontend tests (Vitest) ───────────────────────────────────────────────
  test-client:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @guruapp/shared build

      - name: Run Vitest
        run: pnpm --filter client exec vitest run
